<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WS 下单桥接服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <div class="min-h-screen flex flex-col">

      <!-- Header -->
      <header class="border-b border-gray-200 bg-white">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
          <h1 class="text-sm font-semibold tracking-tight">WS 下单桥接</h1>
          <div class="flex items-center gap-3">
            <div id="ws-status" class="status-badge status-off">
              WS: <span class="ml-1 font-medium">未知</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Main -->
      <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-5 space-y-5">

        <!-- Toolbar -->
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2">
            <button id="btn-ws-connect" type="button" class="btn btn-primary">连接 WS</button>
            <button id="btn-ws-disconnect" type="button" class="btn btn-ghost">断开</button>
          </div>
          <div class="flex items-center gap-2">
            <button id="btn-import-json" type="button" class="btn btn-ghost text-xs" title="从 config.json 文本粘贴恢复配置">导入 JSON</button>
            <button id="btn-add-task" type="button" class="btn btn-ghost text-xs">+ 添加任务</button>
            <button id="btn-save-config" type="button" class="btn btn-primary">保存配置</button>
          </div>
        </div>

        <!-- WS Config -->
        <section class="card">
          <div class="flex items-center justify-between mb-3">
            <h2 class="section-title">上游 WebSocket</h2>
            <label class="switch-label" for="wsEnabled">
              <span class="text-xs text-gray-500">启用</span>
              <span class="switch">
                <input id="wsEnabled" type="checkbox" class="switch-input" />
                <span class="switch-track"></span>
              </span>
            </label>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            <div class="sm:col-span-2">
              <label class="label" for="wsUrl">WS 地址 <span class="tag">必填</span></label>
              <input id="wsUrl" type="text" class="input" placeholder="ws://host:port/path" />
            </div>
            <div>
              <label class="label" for="wsKey">WS Key <span class="tag tag-muted">可选</span></label>
              <input id="wsKey" type="text" class="input" />
            </div>
          </div>
        </section>

        <!-- Tasks -->
        <section>
          <div id="tasks-container" class="space-y-4"></div>
        </section>

        <!-- Logs -->
        <section class="card">
          <div class="flex items-center justify-between mb-2">
            <h2 class="section-title">日志</h2>
            <span class="text-[11px] text-gray-400">最近 500 条</span>
          </div>
          <div id="log-container" class="log-box"></div>
        </section>

      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
